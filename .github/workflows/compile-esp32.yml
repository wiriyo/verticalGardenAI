name: Compile ESP32 Firmware

on:
  push:
    branches: [ main, master ]
    paths:
      - 'verticalGardenAI/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  ESP32_BOARD: esp32:esp32:esp32
  SKETCH_PATH: ./verticalGardenAI

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh
          arduino-cli config init
          arduino-cli version

      - name: Add ESP32 board URL
        run: |
          arduino-cli config set board_manager.additional_urls "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

      - name: Update core index & install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install required libraries
        run: |
          arduino-cli lib install "BH1750"
          arduino-cli lib install "PubSubClient"
          arduino-cli lib install "ArduinoJson"
          echo "✅ Libraries installed"

      - name: Compile firmware
        run: |
          arduino-cli compile --fqbn ${{ env.ESP32_BOARD }} \
            --output-dir ./build \
            ${{ env.SKETCH_PATH }} 2>&1

      - name: List build output
        run: ls -la ./build/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: ./build/*.bin
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: "Firmware v${{ github.run_number }}"
          body: |
            ## Firmware Release v${{ github.run_number }}
            - ✅ Compiled from commit: ${{ github.sha }}
            - 📅 Auto-build by GitHub Actions
            - 🔧 Board: ESP32 (${{ env.ESP32_BOARD }})
          files: |
            build/*.bin
          generate_release_notes: false
